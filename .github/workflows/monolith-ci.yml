# Monolith (root): typecheck, test. Runs when root-level files change.
name: "Monolith CI"

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "index.ts"
      - "scripts/**"
      - "__tests__/**"
      - ".github/workflows/monolith-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "index.ts"
      - "scripts/**"
      - "__tests__/**"
      - ".github/workflows/monolith-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
